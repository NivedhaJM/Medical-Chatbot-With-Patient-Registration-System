<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Edit Profile | HEALMATE</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

body{
  background:linear-gradient(to bottom,#0c1424,#121c32);
  font-family:Poppins,sans-serif;
  color:white;
  margin:0;
}

nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 60px;
  background:#1C4D8D;
}

nav a{
  color:#eaf2ff;
  text-decoration:none;
  margin-left:22px;
}

nav a:hover{
  color:#2ec4b6;
}

.form-wrapper{
  width:90%;
  max-width:900px;
  margin:40px auto;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(25px);
  box-shadow:0 20px 60px rgba(0,0,0,.4);
}

h2{
  text-align:center;
  margin-bottom:25px;
}

.form-group{
  display:flex;
  flex-direction:column;
  margin-bottom:15px;
}

.two-column{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

input, textarea, select{
  padding:10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(20,30,60,.5);
  color:white;
}

.radio-group{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
}

button{
  margin-top:25px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#2f80ed,#2ec4b6);
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  transform:translateY(-2px);
}
</style>
</head>

<body>

<nav>
  <div>HealMate</div>
  <div>
    <a href="/home">HOME</a>
    <a href="/edit_profile">UPDATE PROFILE</a>
    <a href="/history">CHAT HISTORY</a>
    <a href="/login">LOGOUT</a>
  </div>
</nav>

<div class="form-wrapper">
<h2>Edit Profile</h2>

<form action="/update_profile" method="POST">
<div class="two-column">
  <div class="form-group">
    <label>First Name</label>
    <input type="text" name="first_name" value="{{ patient[1] }}" required>
  </div>

  <div class="form-group">
    <label>Last Name</label>
    <input type="text" name="last_name" value="{{ patient[2] }}" required>
  </div>
</div>

<div class="form-group">
<label>Gender</label>
<div class="radio-group">
  <label><input type="radio" name="gender" value="Male" {% if patient[3]=="Male" %}checked{% endif %}> Male</label>
  <label><input type="radio" name="gender" value="Female" {% if patient[3]=="Female" %}checked{% endif %}> Female</label>
</div>
</div>

<div class="two-column">
  <div class="form-group">
    <label>Age</label>
    <input type="number" name="age" value="{{ patient[4] }}" required>
  </div>

  <div class="form-group">
    <label>Height (cm)</label>
    <input type="number" name="height" value="{{ patient[5] }}" required>
  </div>
</div>

<div class="form-group">
  <label>Weight (kg)</label>
  <input type="number" name="weight" value="{{ patient[6] }}" required>
</div>

<div class="form-group">
  <label>Address</label>
  <textarea name="address">{{ patient[7] }}</textarea>
</div>

<div class="two-column">
  <div class="form-group">
    <label>City</label>
    <input type="text" name="city" value="{{ patient[8] }}">
  </div>

  <div class="form-group">
    <label>State</label>
    <input type="text" name="state" value="{{ patient[9] }}">
  </div>
</div>

<div class="form-group">
  <label>Pincode</label>
  <input type="text" name="pincode" value="{{ patient[10] }}">
</div>

<div class="form-group">
  <label>Phone</label>
  <input type="text" name="phone" value="{{ patient[11] }}">
</div>

<div class="form-group">
  <label>Email</label>
  <input type="email" name="email" value="{{ patient[12] }}" readonly>
</div>

<div class="form-group">
  <label>Work Type</label>
  <input type="text" name="work_type" value="{{ patient[13] }}">
</div>

<div class="form-group">
<label>Blood Group</label>
<div class="radio-group">
  {% for bg in ["A+","A-","B+","B-","O+","O-","AB+","AB-"] %}
    <label>
      <input type="radio" name="blood_group" value="{{ bg }}"
      {% if patient[14]==bg %}checked{% endif %}>
      {{ bg }}
    </label>
  {% endfor %}
</div>
</div>

<div class="form-group">
<label>Taking Medications?</label>
<div class="radio-group">
  <label><input type="radio" name="medications" value="Yes" {% if patient[15]=="Yes" %}checked{% endif %}> Yes</label>
  <label><input type="radio" name="medications" value="No" {% if patient[15]=="No" %}checked{% endif %}> No</label>
</div>
</div>

<div class="two-column">
  <div class="form-group">
    <label>Medication Name</label>
    <input type="text" name="medication_name" value="{{ patient[16] }}">
  </div>

  <div class="form-group">
    <label>Frequency</label>
    <input type="text" name="medication_frequency" value="{{ patient[17] }}">
  </div>
</div>

<div class="form-group">
  <label>Dosage</label>
  <input type="text" name="dosage" value="{{ patient[18] }}">
</div>

<div class="form-group">
  <label>Medical History</label>
  <select name="remarks">
    <option value="none" {% if patient[19]=="none" %}selected{% endif %}>None</option>
    <option value="diabetes" {% if patient[19]=="diabetes" %}selected{% endif %}>Diabetes</option>
    <option value="hypertension" {% if patient[19]=="hypertension" %}selected{% endif %}>Hypertension</option>
    <option value="heart attack" {% if patient[19]=="heart attack" %}selected{% endif %}>Heart Attack</option>
  </select>
</div>

<button type="submit">Update Profile</button>

</form>
</div>

</body>
</html>
